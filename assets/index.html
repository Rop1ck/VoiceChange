<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Anime Dubber</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        h1 { color: #e94560; margin-bottom: 1.5rem; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e94560; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #ff4d6d; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #e94560; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>VoiceAnime AI</h1>
    
    <label for="videoFile">Step 1: Select MP4 Video</label>
    <input type="file" id="videoFile" accept="video/mp4">

    <label for="modelName">Step 2: Character Model Name</label>
    <input type="text" id="modelName" placeholder="e.g. Goku (no .pth needed)">

    <label for="pitch">Step 3: Pitch Adjustment</label>
    <select id="pitch">
        <option value="-12">-12 (Deep/Male)</option>
        <option value="0" selected>0 (Original)</option>
        <option value="12">+12 (High/Female)</option>
    </select>

    <button onclick="uploadVideo()">Generate AI Dub</button>

    <div class="loader" id="loader"></div>
    <div id="status">Ready to process...</div>
</div>

<script>
    async function uploadVideo() {
        const fileInput = document.getElementById('videoFile');
        const modelInput = document.getElementById('modelName');
        const pitchInput = document.getElementById('pitch');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        if (!fileInput.files[0] || !modelInput.value) {
            alert("Please select a video and enter a model name!");
            return;
        }

        const formData = new FormData();
        formData.append("video", fileInput.files[0]);
        formData.append("model_name", modelInput.value);
        formData.append("pitch", pitchInput.value);

        status.innerText = "Processing... This will take a few minutes.";
        loader.style.display = "block";

        try {
            const response = await fetch("Hier die URL eingeben/process-video/", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `AI_Dub_${fileInput.files[0].name}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                status.innerText = "Success! Download started.";
            } else {
                status.innerText = "Error during processing.";
            }
        } catch (error) {
            console.error(error);
            status.innerText = "Failed to connect to server.";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
